<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LazyTrip · 新西兰 10 天行程生成器</title>
<style>
:root{--bg:#FAFAF8;--surface:#fff;--surface2:#F4F3EF;--border:rgba(0,0,0,0.1);--border-md:rgba(0,0,0,0.18);--text:#1A1A18;--text2:#5A5A55;--text3:#999890;--teal:#1D9E75;--tl:#E1F5EE;--td:#0F6E56;--blue:#378ADD;--bl:#E6F1FB;--bd:#185FA5;--amber:#BA7517;--al:#FAEEDA;--coral:#993C1D;--cl:#FAECE7;--purple:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--rl:#FCEBEB;--red:#A32D2D;--rb:#F09595;--r:12px;--rs:8px;}
{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.page{max-width:680px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.screen{display:none;}.screen.active{display:block;}
.hdr{text-align:center;padding:2.5rem 0 2rem;border-bottom:.5px solid var(--border);margin-bottom:2rem;}
.hdr h1{font-size:24px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px;}
.hdr p{font-size:15px;color:var(--text2);max-width:420px;margin:0 auto;}
.flag{font-size:28px;display:block;margin-bottom:10px;}
.brand{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:block;}
.pbar{display:flex;gap:6px;margin-bottom:2rem;}
.ps{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s;}
.ps.done{background:var(--teal);}.ps.act{background:var(--teal);opacity:.5;}
.slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:1.75rem;font-weight:500;}
.og{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:.5rem;}
@media(min-width:480px){.og.four{grid-template-columns:repeat(4,1fr);}}
.oc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;}
.oc:hover{border-color:var(--border-md);background:var(--surface2);}
.oc.st{border:1.5px solid var(--teal);background:var(--tl);}.oc.st .ot{color:var(--td);}
.oc.sb{border:1.5px solid var(--blue);background:var(--bl);}.oc.sb .ot{color:var(--bd);}
.oi{font-size:22px;margin-bottom:8px;display:block;}
.ot{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.od{font-size:12px;color:var(--text2);line-height:1.5;}
.br{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;cursor:pointer;text-align:center;transition:border-color .15s;}
.bc:hover{border-color:var(--border-md);}
.bc.sb{border:1.5px solid var(--blue);background:var(--bl);}.bc.sb .ot{color:var(--bd);}
.bp{font-size:13px;color:var(--text2);margin-top:3px;}
.btn{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:1.75rem;}
.btn:hover{opacity:.85;}.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn.teal{background:var(--teal);margin-top:0;}.btn.teal:hover{opacity:.9;}
.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);cursor:pointer;margin-bottom:1.5rem;padding:6px 0;border:none;background:none;}
.back:hover{color:var(--text);}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 1.5rem;}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;}
.tg{background:var(--tl);color:var(--td);}.tb{background:var(--bl);color:var(--bd);}
.ta{background:var(--al);color:var(--amber);}.tc{background:var(--cl);color:var(--coral);}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.sc{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;}
.sl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.sv{font-size:17px;font-weight:600;color:var(--text);}
.ss{font-size:11px;color:var(--text2);margin-top:2px;}
.bdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:1.5rem;}
.bdl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:14px;}
.bdbars{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
.bdrow{display:flex;align-items:center;gap:10px;}
.bdcat{font-size:13px;color:var(--text2);min-width:70px;flex-shrink:0;}
.bdtrack{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bdfill{height:100%;border-radius:3px;}
.bdpct{font-size:12px;color:var(--text3);min-width:32px;text-align:right;}
.bdnote{font-size:12px;color:var(--text3);border-top:.5px solid var(--border);padding-top:10px;line-height:1.6;}
.cbox{background:var(--rl);border:1px solid var(--rb);border-radius:var(--rs);padding:12px 16px;margin-bottom:1.5rem;}
.ct{font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px;}
.cd{font-size:13px;color:#791F1F;line-height:1.55;}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;}
.dh{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.db{background:var(--surface2);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--text2);font-weight:600;}
.dt{font-size:15px;font-weight:600;color:var(--text);}
.dm{font-size:13px;color:var(--text3);margin-bottom:10px;}
.dtag{display:inline-block;font-size:12px;background:var(--bl);color:var(--bd);border-radius:4px;padding:3px 8px;margin-bottom:8px;font-weight:500;}
.dcost{display:inline-block;font-size:12px;background:var(--tl);color:var(--td);border-radius:4px;padding:3px 8px;margin-bottom:12px;margin-left:6px;font-weight:500;}
.tl{padding-top:10px;border-top:.5px solid var(--border);}
.tli{display:flex;gap:0;}
.tll{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0;}
.tldot{width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid var(--surface);box-shadow:0 0 0 1.5px var(--teal);margin-top:4px;flex-shrink:0;}
.tldot.w{background:var(--amber);box-shadow:0 0 0 1.5px var(--amber);}
.tlline{width:1.5px;background:var(--border);flex:1;margin:3px 0;}
.tlb{flex:1;padding-bottom:14px;min-width:0;}
.tltime{font-size:11px;color:var(--text3);margin-bottom:2px;margin-top:2px;}
.tlname{font-size:14px;font-weight:600;color:var(--text);}
.tldet{font-size:13px;color:var(--text2);line-height:1.55;margin-top:2px;}
.tlwarn{display:inline-block;font-size:11px;background:var(--al);color:var(--amber);border-radius:4px;padding:2px 8px;margin-top:5px;font-weight:600;}
.tltip{display:inline-block;font-size:11px;background:var(--tl);color:var(--td);border-radius:4px;padding:2px 8px;margin-top:5px;font-weight:600;}
.tllink{display:inline-block;font-size:11px;background:var(--bl);color:var(--bd);border-radius:4px;padding:2px 8px;margin-top:5px;font-weight:600;text-decoration:none;}
.lugcat{margin-bottom:1rem;}
.lugcattitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.lugitems{display:flex;flex-wrap:wrap;gap:6px;}
.lugitem{font-size:12px;background:var(--surface2);border:.5px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.lugitem:hover{border-color:var(--border-md);}
.lugitem.chk{background:var(--tl);border-color:var(--teal);color:var(--td);text-decoration:line-through;}
.chklist{margin-bottom:1.5rem;}
.chi{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:.5px solid var(--border);}
.chi:last-child{border-bottom:none;}
.chbox{width:18px;height:18px;border:1.5px solid var(--teal);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
.chtext{font-size:14px;color:var(--text);font-weight:500;}
.chsub{font-size:12px;color:var(--text2);margin-top:2px;font-weight:400;}
/ accommodation comparison by budget /
.accom-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.accom-card{border-radius:var(--rs);padding:10px 12px;font-size:12px;}
.accom-budget{background:#F4F3EF;border:1px solid var(--border);}
.accom-mid{background:var(--bl);border:1px solid rgba(55,138,221,.2);}
.accom-lux{background:#FAEEDA;border:1px solid rgba(186,117,23,.2);}
.accom-tier{font-size:10px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.accom-budget .accom-tier{color:var(--text3);}
.accom-mid .accom-tier{color:var(--bd);}
.accom-lux .accom-tier{color:var(--amber);}
.accom-name{font-weight:600;color:var(--text);margin-bottom:2px;}
.accom-price{color:var(--text2);}
.gate{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-top:2rem;}
.gttl{font-size:17px;font-weight:600;margin-bottom:6px;}
.gsub{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.glbl{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.gta{width:100%;border:1px solid var(--border-md);border-radius:var(--rs);padding:12px 14px;font-size:14px;color:var(--text);background:var(--bg);resize:none;height:90px;font-family:inherit;transition:border-color .15s;outline:none;}
.gta:focus{border-color:var(--teal);}
.ghint{font-size:12px;color:var(--text3);margin-top:6px;margin-bottom:16px;}
.gnote{font-size:12px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.6;}
.cust{display:flex;gap:12px;align-items:flex-start;background:var(--al);border:1px solid rgba(186,117,23,.25);border-radius:var(--rs);padding:12px 14px;margin:14px 0 16px;}
.custtl{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:3px;}
.custd{font-size:12px;color:var(--amber);opacity:.85;line-height:1.55;}
.thero{text-align:center;padding:1.5rem 0 1rem;}
.thicon{font-size:40px;display:block;margin-bottom:12px;}
.thtl{font-size:20px;font-weight:600;margin-bottom:6px;}
.thsub{font-size:14px;color:var(--text2);line-height:1.6;}
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;}
.hchdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.hcicon{font-size:24px;flex-shrink:0;}
.hctitle{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;}
.hcdesc{font-size:13px;color:var(--text2);line-height:1.55;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-bottom:10px;}
.bi{background:var(--tl);color:var(--td);}.bs{background:var(--bl);color:var(--bd);}.bv{background:var(--pl);color:var(--pd);}
.hinput{width:100%;border:1px solid var(--border-md);border-radius:var(--rs);padding:10px 14px;font-size:14px;color:var(--text);background:var(--bg);font-family:inherit;outline:none;transition:border-color .15s;margin-top:6px;}
.hinput:focus{border-color:var(--teal);}
.hsub{margin-top:10px;padding:10px 20px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.hsub:hover{opacity:.85;}.hsub.done{background:var(--teal);cursor:default;}
.dgrid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.dbtn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text);}
.dbtn:hover{border-color:var(--border-md);}.dbtn.sel{background:var(--pl);border-color:var(--purple);color:var(--pd);font-weight:600;}
hr{border:none;border-top:.5px solid var(--border);margin:1.75rem 0;}
.fnote{text-align:center;font-size:12px;color:var(--text3);padding-top:2rem;line-height:1.7;}
/ budget-specific highlight in accom */
.highlight-budget{display:none;}.highlight-mid{display:none;}.highlight-lux{display:none;}
body.budget-budget .highlight-budget{display:block;}
body.budget-mid .highlight-mid{display:block;}
body.budget-lux .highlight-lux{display:block;}
@media print{.back,.gate,#gsuccess,#s3,.btn,.lugitem{display:none!important;}body{background:white;}.dc{break-inside:avoid;}}
</style>
</head>
<body>
<div class="page">
